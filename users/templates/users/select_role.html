{% extends "home/base.html" %}
{% block content %}
<div class="container text-center mt-5 pt-5">
    <h2 class="mb-4">Welcome! How will you be using CarpoolApp?</h2>
    
    <form method="POST">
        {% csrf_token %}
        <div class="d-flex justify-content-center gap-4">
            <button type="submit" name="role" value="DRIVER" class="btn btn-outline-primary btn-lg px-5 shadow-sm">
                I am a Driver
            </button>
            <button type="submit" name="role" value="PASSENGER" class="btn btn-outline-success btn-lg px-5 shadow-sm">
                I am a Passenger
            </button>
        </div>
    </form>
</div>
{% endblock content %}
