{% extends "home/base.html" %}

{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">

          <h4 class="card-title mb-3 border-bottom pb-2">
            One last step!
          </h4>
          <p class="text-muted">How will you be using CarpoolApp?</p>

          <form method="POST">
            {% csrf_token %}

            <div class="d-grid gap-3 mt-3">
              <button type="submit" name="role" value="PASSENGER"
                      class="btn btn-outline-primary p-3">
                <h5 class="mb-1">🧍 I'm a Passenger</h5>
                <small class="text-muted">Find carpools on my route</small>
              </button>

              <button type="submit" name="role" value="DRIVER"
                      class="btn btn-outline-dark p-3">
                <h5 class="mb-1">🚗 I'm a Driver</h5>
                <small class="text-muted">Publish trips and earn</small>
              </button>
            </div>

          </form>

        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
