{% extends "home/base.html" %}
{% load crispy_forms_tags %}
{% load socialaccount %}
{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">

          <h4 class="card-title mb-4 border-bottom pb-2">Create Account</h4>

          <form method="POST">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary w-100 mt-2">Sign Up</button>
          </form>

          <!-- DIVIDER -->
          <div class="d-flex align-items-center my-3">
            <hr class="flex-grow-1">
            <span class="mx-2 text-muted small">or</span>
            <hr class="flex-grow-1">
          </div>

           //GOOGLE SIGNUP 
              <a href="{% provider_login_url 'google' process='login' next='/role-redirect/' %}"
                class="btn btn-outline-dark w-100 d-flex align-items-center justify-content-center gap-2">
                  Sign up with Google
              </a>

          <div class="border-top pt-3 mt-3 text-center">
            <small class="text-muted">
              Already have an account?
              <a href="{% url 'login' %}">Sign In</a>
            </small>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
