{% extends "home/base.html" %}

{% block content %}

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
{% endif %}

<div class="content-section">
    <h3>Top Up Wallet</h3>
    <p>Current Balance: <strong>₹{{ request.user.wallet_balance }}</strong></p>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label for="amount">Enter Amount (₹)</label>
            <input type="number"
                   name="amount"
                   id="amount"
                   class="form-control"
                   min="1"
                   step="0.01"
                   placeholder="Enter amount to add">
        </div>

        <button type="submit" class="btn btn-success mt-3">Add Money</button>
        <a href="{% url 'passenger_dashboard' %}" class="btn btn-secondary mt-3 ms-2">
            Cancel
        </a>
    </form>
</div>

{% endblock %}
